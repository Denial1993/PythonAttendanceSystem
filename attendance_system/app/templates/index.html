<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> attendance_system - 智能打卡系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #1e1e2f;
            --secondary-bg: #2d2b42;
            --accent: #ff758c;
            --accent-glow: rgba(255, 117, 140, 0.4);
            --text-light: #f1f1f1;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary-bg), var(--secondary-bg));
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            z-index: 10;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .view {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .view.active {
            display: block;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, #ff758c 0%, #ff7eb3 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 0.95rem;
            color: #a0a0b0;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #d0d0d0;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        .input-group input:focus {
            border-color: #ff758c;
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--glass-border);
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            color: #a0a0b0;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .auth-tab.active {
            color: #ff758c;
            border-bottom: 2px solid #ff758c;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 16px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.5);
        }
        
        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            border: none;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-primary:hover {
            box-shadow: 0 8px 25px var(--accent-glow);
            background: linear-gradient(135deg, #ff7eb3 0%, #ff758c 100%);
        }

        .btn-logout {
            margin-top: 20px;
            color: #f1f1f1;
            background: transparent;
            border: 1px solid #f87171;
            font-size: 0.9rem;
            padding: 10px;
        }

        .btn-logout:hover {
            background: rgba(248, 113, 113, 0.1);
        }

        .btn-check-in { color: #4ade80; border-color: rgba(74, 222, 128, 0.3); }
        .btn-lunch-out { color: #fbbf24; border-color: rgba(251, 191, 36, 0.3); }
        .btn-lunch-in { color: #60a5fa; border-color: rgba(96, 165, 250, 0.3); }
        .btn-check-out { color: #f87171; border-color: rgba(248, 113, 113, 0.3); }

        .btn:hover.btn-check-in { box-shadow: 0 0 15px rgba(74, 222, 128, 0.2); }
        .btn:hover.btn-lunch-out { box-shadow: 0 0 15px rgba(251, 191, 36, 0.2); }
        .btn:hover.btn-lunch-in { box-shadow: 0 0 15px rgba(96, 165, 250, 0.2); }
        .btn:hover.btn-check-out { box-shadow: 0 0 15px rgba(248, 113, 113, 0.2); }

        .status-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 16px;
            margin-top: 24px;
            text-align: left;
            border: 1px solid var(--glass-border);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-card p {
            margin: 8px 0;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }

        .status-val {
            font-weight: 600;
            color: #ff7eb3;
        }

        /* ---------------- Today's Board ---------------- */
        .board-container {
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            text-align: left;
        }

        .board-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #f1f1f1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .board-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .board-list::-webkit-scrollbar { width: 4px; }
        .board-list::-webkit-scrollbar-track { background: transparent; }
        .board-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .board-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .person-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #e2e8f0;
        }

        .person-status {
            font-size: 0.85rem;
            padding: 4px 10px;
            border-radius: 100px;
            font-weight: 500;
        }

        /* Status Colors */
        .status-work { background: rgba(74, 222, 128, 0.2); color: #4ade80; }
        .status-lunch { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
        .status-off { background: rgba(248, 113, 113, 0.2); color: #f87171; }
        .status-default { background: rgba(255, 255, 255, 0.1); color: #cbd5e1; }


        .notification {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 100px;
            font-weight: 500;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            border: 1px solid var(--glass-border);
        }

        .notification.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ---------------- AI 聊天室的 CSS 預留區 ---------------- */
        .chat-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            pointer-events: none;
        }

        .chat-btn {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 1.5rem;
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.4);
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        .chat-btn:hover {
            transform: scale(1.1) rotate(10deg);
        }

        .chat-panel {
            width: 350px;
            height: 450px;
            background: rgba(25, 25, 35, 0.95);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: bottom right;
        }

        .chat-panel.open {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }

        .chat-header {
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            color: #d0d0ff;
        }

        .chat-body {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-body::-webkit-scrollbar { width: 6px; }
        .chat-body::-webkit-scrollbar-track { background: transparent; }
        .chat-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .chat-msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        .msg-bot {
            background: rgba(255, 255, 255, 0.1);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg-user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chat-footer {
            padding: 12px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.2);
        }

        .chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 100px;
            padding: 8px 16px;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        
        .chat-input:focus {
            border-color: #764ba2;
        }

        .chat-send-btn {
            background: transparent;
            border: none;
            color: #764ba2;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 8px;
            transition: color 0.2s;
        }

        .chat-send-btn:hover {
            color: #bfa8ff;
        }

        /* Loading indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 14px;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }
        .typing-indicator.active { display: flex; gap: 4px; }
        .dot { width: 6px; height: 6px; background: #fff; border-radius: 50%; animation: blink 1.4s infinite both; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

        /* ---------------- 員工名冊表格 ---------------- */
        .employee-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }
        .employee-table th {
            padding: 8px 10px;
            text-align: left;
            color: #a0a0b0;
            font-weight: 600;
            border-bottom: 1px solid var(--glass-border);
            white-space: nowrap;
        }
        .employee-table td {
            padding: 10px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #e2e8f0;
        }
        .employee-table tr:last-child td { border-bottom: none; }
        .employee-table tr:hover td { background: rgba(255,255,255,0.03); }
        .btn-edit-sm {
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.4);
            color: #a5b4fc;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-edit-sm:hover { background: rgba(102, 126, 234, 0.4); }

        /* ---------------- 個人資料卡片 ---------------- */
        .profile-card {
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 16px 20px;
            border: 1px solid var(--glass-border);
            text-align: left;
            margin-top: 6px;
        }
        .profile-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            font-size: 0.9rem;
        }
        .profile-row:last-child { border-bottom: none; }
        .profile-label { color: #a0a0b0; }
        .profile-val { font-weight: 600; color: #e2e8f0; }

        /* ---------------- Modal ---------------- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: #1e1e2f;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 32px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease;
        }
        .modal-box h2 {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0 0 20px;
            background: linear-gradient(to right, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-cancel {
            flex: 1;
            background: transparent;
            border: 1px solid var(--glass-border);
            color: #a0a0b0;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .btn-cancel:hover { background: rgba(255,255,255,0.05); }

        /* ===== 出勤統計 ===== */
        .stats-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }
        .month-picker {
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
        }
        .month-picker::-webkit-calendar-picker-indicator { filter: invert(1); }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-card .stat-num {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-card.warn .stat-num {
            background: linear-gradient(135deg, #fb923c, #f43f5e);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-card .stat-label {
            font-size: 0.78rem;
            color: #a0a0b0;
            letter-spacing: 0.5px;
        }
        .daily-detail-list { list-style: none; padding: 0; margin: 0; }
        .daily-detail-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-radius: 10px;
            margin-bottom: 6px;
            background: rgba(255,255,255,0.03);
            font-size: 0.85rem;
            gap: 8px;
            flex-wrap: wrap;
        }
        .daily-detail-list li.late { background: rgba(251, 146, 60, 0.1); }
        .daily-detail-list li.missing { background: rgba(244, 63, 94, 0.1); }
        .detail-date { color: #a0a0b0; white-space: nowrap; }
        .detail-time { color: #e0e0f0; }
        .detail-badge {
            font-size: 0.72rem;
            padding: 2px 8px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .badge-late { background: rgba(251,146,60,0.25); color: #fb923c; }
        .badge-missing { background: rgba(244,63,94,0.25); color: #f43f5e; }
        .badge-ok { background: rgba(34,197,94,0.2); color: #4ade80; }
        .no-stats-msg {
            text-align: center;
            color: #a0a0b0;
            padding: 20px 0;
            font-size: 0.9rem;
        }

        /* ===== 請假系統 ===== */
        .leave-form-container {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .leave-list-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .leave-list-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .leave-status {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        .status-pending { background: rgba(160,160,176,0.2); color: #c0c0d0; }
        .status-approved { background: rgba(34,197,94,0.2); color: #4ade80; }
        .status-rejected { background: rgba(244,63,94,0.2); color: #f43f5e; }
        .leave-dates { color: #e0e0f0; font-size: 0.85rem; margin-bottom: 6px; }
        .leave-reason { color: #a0a0b0; font-size: 0.85rem; }
        .btn-approve { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
        .btn-approve:hover { background: rgba(34,197,94,0.25); }
        .btn-reject { background: rgba(244,63,94,0.15); color: #f43f5e; border: 1px solid rgba(244,63,94,0.3); }
        .btn-reject:hover { background: rgba(244,63,94,0.25); }
        .leave-actions { display: flex; gap: 8px; margin-top: 10px; }
        .leave-actions button {
            flex: 1; padding: 6px; font-size: 0.8rem; border-radius: 8px; cursor: pointer; transition: 0.2s;
        }

    </style>
</head>
<body>

    <div class="notification" id="notification"></div>

    <div class="container">
        
        <!-- ================= Login / Register View ================= -->
        <div id="authView" class="view active">
            <h1>Attendance</h1>
            <p class="subtitle">智能打卡 · 高效出勤管理</p>

            <div class="auth-tabs">
                <div class="auth-tab active" id="tab0" onclick="switchAuthTab(0)">登入</div>
                <div class="auth-tab" id="tab1" onclick="switchAuthTab(1)">註冊</div>
            </div>

            <!-- Login Form -->
            <div id="loginForm">
                <div class="input-group">
                    <label for="loginUsername"><i class="fa-solid fa-user"></i> 帳號</label>
                    <input type="text" id="loginUsername" placeholder="請輸入帳號" autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="loginPassword"><i class="fa-solid fa-lock"></i> 密碼</label>
                    <input type="password" id="loginPassword" placeholder="請輸入密碼" autocomplete="off">
                </div>
                <button class="btn btn-primary" onclick="performLogin()">
                    <i class="fa-solid fa-right-to-bracket"></i> 登入進系統
                </button>
            </div>

            <!-- Register Form -->
            <div id="registerForm" style="display: none;">
                <div class="input-group">
                    <label for="regUsername"><i class="fa-solid fa-user"></i> 帳號</label>
                    <input type="text" id="regUsername" placeholder="請設定帳號" autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="regPassword"><i class="fa-solid fa-lock"></i> 密碼</label>
                    <input type="password" id="regPassword" placeholder="請設定密碼" autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="regEmployeeName"><i class="fa-solid fa-id-card"></i> 真實姓名</label>
                    <input type="text" id="regEmployeeName" placeholder="請輸入本名" autocomplete="off">
                </div>

    <div class="chat-widget">

            <div class="chat-body" id="chatBody">
                <div class="chat-msg msg-bot">你好！我是人事助理。請問你想查詢什麼出勤狀況？</div>
                <!-- 訊息會動態加在這裡 -->
                <div class="typing-indicator" id="typingIndicator">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            </div>

                <input type="text" id="chatInput" class="chat-input" placeholder="問問我你的出勤狀況..." autocomplete="off">
                <button class="chat-send-btn" onclick="sendChatMessage()">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
        <button class="chat-btn" onclick="toggleChat()">
            <i class="fa-solid fa-comment-dots" id="chatIcon"></i>

    <script>
        let currentEmployeeName = localStorage.getItem('employee_name');

        window.onload = function() {
            if (currentEmployeeName) {
                showDashboard();
            } else {
                showAuth();
            }
        };

        function showNotification(message, isError = false) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.style.borderLeft = isError ? "4px solid #f87171" : "4px solid #4ade80";
            notif.classList.add('show');
            setTimeout(() => {
                notif.classList.remove('show');
            }, 3000);
        }

        // --- Auth 相關 ---
        function switchAuthTab(idx) {
            document.getElementById('tab0').classList.remove('active');
            document.getElementById('tab1').classList.remove('active');
            document.getElementById(`tab${idx}`).classList.add('active');

            if (idx === 0) {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            }
        }

        async function performLogin() {
            const u = document.getElementById('loginUsername').value;
            const p = document.getElementById('loginPassword').value;

            if (!u || !p) {
                showNotification("帳號密碼不得為空", true);
                return;
            }

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if (res.ok) {
                    showNotification("登入成功！");
                    localStorage.setItem('employee_name', data.employee_name);
                    localStorage.setItem('username', u);
                    localStorage.setItem('role', String(data.role));
                    currentEmployeeName = data.employee_name;
                    showDashboard();
                } else {
                    showNotification(data.detail || "登入失敗", true);
                }
            } catch (err) {
                showNotification("連線錯誤", true);
            }
        }

        async function performRegister() {
            const u = document.getElementById('regUsername').value;
            const p = document.getElementById('regPassword').value;
            const n = document.getElementById('regEmployeeName').value;

            if (!u || !p || !n) {
                showNotification("所有欄位皆必填", true);
                return;
            }

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p, employee_name: n })
                });
                const data = await res.json();
                if (res.ok) {
                    showNotification("註冊成功！系統為您自動登入。");
                    localStorage.setItem('employee_name', data.employee_name);
                    localStorage.setItem('username', u);
                    currentEmployeeName = data.employee_name;
                    showDashboard();
                } else {
                    showNotification(data.detail || "註冊失敗", true);
                }
            } catch (err) {
                showNotification("連線錯誤", true);
            }
        }

        function performLogout() {
            localStorage.removeItem('employee_name');
            localStorage.removeItem('username');
            localStorage.removeItem('role');
            currentEmployeeName = null;
            showAuth();
        }

        // --- 畫面切換 ---
        function showAuth() {
            document.getElementById('dashboardView').classList.remove('active');
            document.getElementById('authView').classList.add('active');
        }

        function showDashboard() {
            document.getElementById('authView').classList.remove('active');
            document.getElementById('dashboardView').classList.add('active');
            document.getElementById('displayEmployeeName').textContent = currentEmployeeName;
            
            // Set up search defaults
            const todayStr = new Date().toLocaleDateString('en-CA');
            document.getElementById('searchStartDate').value = todayStr;
            document.getElementById('searchEndDate').value = todayStr;

            // Set up month picker default (YYYY-MM)
            const currentYYYYMM = todayStr.substring(0, 7);
            document.getElementById('monthPicker').value = currentYYYYMM;

            const role = localStorage.getItem('role');
            if (role === '1' || role === '2') {
                document.getElementById('searchTargetEmployeeWrapper').style.display = 'block';
                // 管理者：顯示員工名冊
                document.getElementById('staffListContainer').style.display = 'block';
                document.getElementById('leaveApprovalBlock').style.display = 'block';
                loadStaffList();
                loadPendingLeaves();
            } else {
                document.getElementById('searchTargetEmployeeWrapper').style.display = 'none';
                document.getElementById('staffListContainer').style.display = 'none';
                document.getElementById('leaveApprovalBlock').style.display = 'none';
            }

            // Role 3 員工不顯示薪資欄
            if (role === '3') {
                document.getElementById('profileSalaryRow').style.display = 'none';
            } else {
                document.getElementById('profileSalaryRow').style.display = 'flex';
            }
            
            // 重新讀取狀態
            loadPersonalStatus();
            loadBoardData();
            loadMyProfile();
            loadMonthlySummary();
            loadMyLeaves();
        }

        // --- Dashboard 資料載入 ---
        async function loadPersonalStatus() {
            if (!currentEmployeeName) return;
            try {
                const res = await fetch(`/api/attendance/${encodeURIComponent(currentEmployeeName)}`);
                const data = await res.json();
                
                // 找到今天的打卡
                const todayStr = new Date().toLocaleDateString('en-CA'); // 'YYYY-MM-DD' depending on TZ, fallback
                const todayRec = data.find(r => r.date === new Date().toISOString().split('T')[0] || true); 
                // Since this is a simple demo, we just take the first record if it exists and matches today
                
                if (data.length > 0) {
                    // Check if the most recent is today by verifying on backend or just trusting local date.
                    // For now, API returns all historical sorted by date desc. First is most recent.
                    updateStatusCard(data[0]);
                } else {
                    updateStatusCard({}); // Empty card
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function loadBoardData() {
            const u = localStorage.getItem('username');
            const role = localStorage.getItem('role');
            const boardContainer = document.getElementById('everyoneBoardContainer');
            if (!role || (role !== '1' && role !== '2')) {
                if (boardContainer) boardContainer.style.display = 'none';
                return;
            }
            if (boardContainer) boardContainer.style.display = 'block';

            try {
                const res = await fetch(`/api/attendance/today?username=${encodeURIComponent(u)}`);
                const data = await res.json();
                renderBoard(data);
            } catch (e) {
                console.error(e);
            }
        }

        async function performSearch() {
            const u = localStorage.getItem('username');
            const sd = document.getElementById('searchStartDate').value;
            const ed = document.getElementById('searchEndDate').value;
            const target = document.getElementById('searchTargetEmployee').value;

            if (!sd || !ed) {
                showNotification("必須選擇日期區間", true);
                return;
            }

            try {
                let url = `/api/attendance/search?username=${encodeURIComponent(u)}&start_date=${encodeURIComponent(sd)}&end_date=${encodeURIComponent(ed)}`;
                const role = localStorage.getItem('role');
                if ((role === '1' || role === '2') && target.trim() !== '') {
                    url += `&target_employee_name=${encodeURIComponent(target.trim())}`;
                }

                const res = await fetch(url);
                const data = await res.json();
                if (!res.ok) {
                    showNotification(data.detail || "查詢失敗", true);
                    return;
                }
                
                renderSearchResult(data);
                document.getElementById('searchResultList').style.display = 'block';
            } catch(e) {
                console.error(e);
                showNotification("查詢連線錯誤", true);
            }
        }

        function renderSearchResult(records) {
            const list = document.getElementById('searchResultList');
            list.innerHTML = '';
            
            if (records.length === 0) {
                list.innerHTML = '<div style="color: #94a3b8; font-size: 0.9rem; padding: 10px;">該區間尚無打卡紀錄。</div>';
                return;
            }

            records.forEach(rec => {
                const checkIn = rec.check_in_time ? rec.check_in_time.substring(0, 5) : '--:--';
                const checkOut = rec.check_out_time ? rec.check_out_time.substring(0, 5) : '--:--';
                const sCls = getStatusClass(rec.status);
                
                const div = document.createElement('div');
                div.className = 'board-item';
                div.innerHTML = `
                    <div style="flex: 1;">
                        <div style="font-weight: 600; font-size: 0.95rem; margin-bottom: 4px;">${rec.employee_name} ${rec.date}</div>
                        <div style="font-size: 0.8rem; color: #94a3b8;">In: ${checkIn} | Out: ${checkOut}</div>
                    </div>
                    <div class="status-badge ${sCls}">${rec.status}</div>
                `;
                list.appendChild(div);
            });
        }

        function getStatusClass(status) {
            if (!status) return 'status-default';
            if (status.includes('上班')) return 'status-work';
            if (status.includes('午')) return 'status-lunch';
            if (status.includes('下班')) return 'status-off';
            return 'status-default';
        }

        function renderBoard(records) {
            const list = document.getElementById('boardList');
            list.innerHTML = '';
            
            if (records.length === 0) {
                list.innerHTML = '<div style="color: #94a3b8; font-size: 0.9rem; padding: 10px;">今日尚無人打卡。</div>';
                return;
            }

            records.forEach(r => {
                const el = document.createElement('div');
                el.className = 'board-item';
                
                const cssClass = getStatusClass(r.status);

                el.innerHTML = `
                    <div class="person-name">${r.employee_name}</div>
                    <div class="person-status ${cssClass}">
                        ${r.status} ${r.check_in_time ? r.check_in_time.substring(0,5) : ''}
                    </div>
                `;
                list.appendChild(el);
            });
        }

        // --- 打卡動作 ---
        async function performAction(action) {
            if (!currentEmployeeName) {
                showNotification("未登入，請重新登入！", true);
                performLogout();
                return;
            }

            try {
                const response = await fetch(`/api/attendance/?employee_name=${encodeURIComponent(currentEmployeeName)}&action=${encodeURIComponent(action)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();
                
                if (response.ok) {
                    showNotification(`成功打卡：${action}`);
                    updateStatusCard(data);
                    loadBoardData(); // 動態刷新大家打卡板
                } else {
                    showNotification(data.detail || "發生錯誤", true);
                }
            } catch (error) {
                showNotification("連線發生錯誤，請稍後再試", true);
            }
        }

        function updateStatusCard(data) {
            document.getElementById('statusVal').textContent = data.status || '尚未打卡';
            
            const formatTime = (timeStr) => timeStr ? timeStr.substring(0, 8) : '-';
            
            document.getElementById('valCheckIn').textContent = formatTime(data.check_in_time);
            document.getElementById('valLunchOut').textContent = formatTime(data.lunch_out_time);
            document.getElementById('valLunchIn').textContent = formatTime(data.lunch_in_time);
            document.getElementById('valCheckOut').textContent = formatTime(data.check_out_time);
        }

        // --- 聊天室邏輯 ---
        function toggleChat() {
            const panel = document.getElementById('chatPanel');
            const icon = document.getElementById('chatIcon');
            panel.classList.toggle('open');
            if (panel.classList.contains('open')) {
                icon.classList.remove('fa-comment-dots');
                icon.classList.add('fa-xmark');
            } else {
                icon.classList.remove('fa-xmark');
                icon.classList.add('fa-comment-dots');
            }
        }

        function appendMessage(text, isUser = false) {
            const body = document.getElementById('chatBody');
            const indicator = document.getElementById('typingIndicator');
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-msg ${isUser ? 'msg-user' : 'msg-bot'}`;
            msgDiv.textContent = text;
            body.insertBefore(msgDiv, indicator);
            body.scrollTop = body.scrollHeight;
        }

        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();

            if (!text) return;

            appendMessage(text, true);
            input.value = '';

            if (!currentEmployeeName) {
                appendMessage("請登入後，我才能幫您查詢喔！");
                return;
            }

            const indicator = document.getElementById('typingIndicator');
            indicator.classList.add('active');
            const body = document.getElementById('chatBody');
            body.scrollTop = body.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employee_name: currentEmployeeName, query: text })
                });

                const data = await response.json();
                indicator.classList.remove('active');
                
                if (response.ok) {
                    appendMessage(data.reply);
                } else {
                    appendMessage("抱歉，查詢時發生錯誤：" + (data.detail || "未知錯誤"));
                }
            } catch (error) {
                indicator.classList.remove('active');
                appendMessage("網路發生連線問題，無法聯繫後端大腦。");
            }
        }

        // 監聽 Enter 送出訊息
        document.getElementById('chatInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendChatMessage();
            }
        });

        // --- 員工名冊 (Role 1/2) ---
        async function loadStaffList() {
            const u = localStorage.getItem('username');
            try {
                const res = await fetch(`/api/users?username=${encodeURIComponent(u)}`);
                if (!res.ok) return;
                const data = await res.json();
                renderStaffTable(data);
            } catch(e) { console.error(e); }
        }

        function renderStaffTable(users) {
            const tbody = document.getElementById('staffTableBody');
            tbody.innerHTML = '';
            const roleLabels = { 1: '🔑 管理員', 2: '👔 主管', 3: '👤 員工' };
            users.forEach(u => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${u.employee_name}</td>
                    <td style="color:#a0a0b0">${u.username}</td>
                    <td>${u.phone || '<span style="color:#555">未填</span>'}</td>
                    <td>${u.salary ? '$' + u.salary.toLocaleString() : '<span style="color:#555">未設定</span>'}</td>
                    <td>${roleLabels[u.role] || u.role}</td>
                    <td><button class="btn-edit-sm" onclick="openEditModal(${u.id},'${u.phone||''}','${u.address||''}','${u.salary||''}')">
                        <i class="fa-solid fa-pen"></i></button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- 出勤統計 ---
        document.getElementById('monthPicker').addEventListener('change', () => {
            loadMonthlySummary();
        });

        async function loadMonthlySummary() {
            const u = localStorage.getItem('username');
            const monthVal = document.getElementById('monthPicker').value; // format: "YYYY-MM"
            if (!monthVal) return;
            const [year, month] = monthVal.split('-');

            try {
                const res = await fetch(`/api/attendance/summary?username=${encodeURIComponent(u)}&year=${year}&month=${month}`);
                if (!res.ok) {
                    showNotification("無法載入出勤統計", true);
                    return;
                }
                const data = await res.json();
                
                document.getElementById('statWorkDays').textContent = data.work_days;
                document.getElementById('statLateCount').textContent = data.late_count;
                document.getElementById('statLateMinutes').textContent = data.total_late_minutes;
                document.getElementById('statMissingDays').textContent = data.missing_checkin_days + data.missing_checkout_days;

                renderDailyDetails(data.daily_details);

            } catch(e) { console.error(e); }
        }

        function renderDailyDetails(details) {
            const list = document.getElementById('dailyDetailList');
            const noDataMsg = document.getElementById('noStatsMsg');
            list.innerHTML = '';
            
            if (!details || details.length === 0) {
                noDataMsg.style.display = 'block';
                return;
            }
            noDataMsg.style.display = 'none';

            details.forEach(d => {
                const li = document.createElement('li');
                let classNames = [];
                let badges = [];

                if (d.is_late) {
                    classNames.push('late');
                    badges.push(`<span class="detail-badge badge-late">遲到 ${d.late_minutes} 分</span>`);
                }
                if (d.is_missing_checkin) {
                    classNames.push('missing');
                    badges.push(`<span class="detail-badge badge-missing">漏打上班卡</span>`);
                }
                if (d.is_missing_checkout && !d.is_missing_checkin) {
                    classNames.push('missing');
                    badges.push(`<span class="detail-badge badge-missing">漏打下班卡</span>`);
                }
                if (badges.length === 0) {
                    badges.push(`<span class="detail-badge badge-ok">正常</span>`);
                }

                li.className = classNames.join(' ');
                
                // 格式化時間，去掉秒數
                const inTime = d.check_in_time ? d.check_in_time.substring(0, 5) : '--:--';
                const outTime = d.check_out_time ? d.check_out_time.substring(0, 5) : '--:--';

                li.innerHTML = `
                    <div style="display:flex; align-items:center; gap:12px;">
                        <span class="detail-date">${d.date.substring(5)}</span>
                        <span class="detail-time">${inTime} ~ ${outTime}</span>
                    </div>
                    <div style="display:flex; gap:6px;">
                        ${badges.join('')}
                    </div>
                `;
                list.appendChild(li);
            });
        }

        // --- 請假系統 ---
        async function submitLeaveRequest() {
            const u = localStorage.getItem('username');
            const type = document.getElementById('leaveType').value;
            const start = document.getElementById('leaveStart').value;
            const end = document.getElementById('leaveEnd').value;
            const reason = document.getElementById('leaveReason').value;

            if (!start || !end) {
                showNotification("必須填寫開始與結束時間", true);
                return;
            }

            try {
                const res = await fetch(`/api/leave?username=${encodeURIComponent(u)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ leave_type: type, start_time: start, end_time: end, reason: reason })
                });
                if (res.ok) {
                    showNotification("請假單已送出，等待審核中");
                    // 清空表單
                    document.getElementById('leaveStart').value = '';
                    document.getElementById('leaveEnd').value = '';
                    document.getElementById('leaveReason').value = '';
                    loadMyLeaves(); // 重新整理列表
                } else {
                    const data = await res.json();
                    showNotification(data.detail || "送出失敗", true);
                }
            } catch(e) {
                showNotification("連線錯誤", true);
            }
        }

        async function loadMyLeaves() {
            const u = localStorage.getItem('username');
            try {
                const res = await fetch(`/api/leave?username=${encodeURIComponent(u)}`);
                if (!res.ok) return;
                const leaves = await res.json();
                
                const block = document.getElementById('myLeaveListBlock');
                block.innerHTML = '';
                if(leaves.length === 0) {
                    block.innerHTML = '<p class="no-stats-msg">目前沒有假單紀錄</p>';
                    return;
                }

                leaves.forEach(l => {
                    let statusClass = "status-pending";
                    let statusText = "待審核";
                    if (l.status === 'approved') { statusClass = 'status-approved'; statusText = '已同意'; }
                    if (l.status === 'rejected') { statusClass = 'status-rejected'; statusText = '已拒絕'; }

                    const div = document.createElement('div');
                    div.className = 'leave-list-item';
                    div.innerHTML = `
                        <div class="leave-list-item-header">
                            <strong>${l.leave_type}</strong>
                            <span class="leave-status ${statusClass}">${statusText}</span>
                        </div>
                        <div class="leave-dates"><i class="fa-regular fa-clock"></i> ${l.start_time.replace('T', ' ')} ~ ${l.end_time.replace('T', ' ')}</div>
                        <div class="leave-reason"><i class="fa-solid fa-note-sticky"></i> ${l.reason || '無事由'}</div>
                    `;
                    block.appendChild(div);
                });
            } catch(e) { console.error(e); }
        }

        async function loadPendingLeaves() {
            const u = localStorage.getItem('username');
            try {
                const res = await fetch(`/api/leave?username=${encodeURIComponent(u)}`);
                if (!res.ok) return;
                const leaves = await res.json();
                
                const block = document.getElementById('approvalLeaveListBlock');
                block.innerHTML = '';
                const pendingLeaves = leaves.filter(l => l.status === 'pending');
                
                if(pendingLeaves.length === 0) {
                    block.innerHTML = '<p class="no-stats-msg">目前沒有待審核假單</p>';
                    return;
                }

                pendingLeaves.forEach(l => {
                    const div = document.createElement('div');
                    div.className = 'leave-list-item';
                    div.innerHTML = `
                        <div class="leave-list-item-header">
                            <strong>${l.employee_name} - ${l.leave_type}</strong>
                            <span class="leave-status status-pending">待審核</span>
                        </div>
                        <div class="leave-dates"><i class="fa-regular fa-clock"></i> ${l.start_time.replace('T', ' ')} ~ ${l.end_time.replace('T', ' ')}</div>
                        <div class="leave-reason"><i class="fa-solid fa-note-sticky"></i> ${l.reason || '無事由'}</div>
                        <div class="leave-actions">
                            <button class="btn-approve" onclick="updateLeaveStatus(${l.id}, 'approved')"><i class="fa-solid fa-check"></i> 同意</button>
                            <button class="btn-reject" onclick="updateLeaveStatus(${l.id}, 'rejected')"><i class="fa-solid fa-xmark"></i> 拒絕</button>
                        </div>
                    `;
                    block.appendChild(div);
                });
            } catch(e) { console.error(e); }
        }

        async function updateLeaveStatus(id, newStatus) {
            const u = localStorage.getItem('username');
            try {
                const res = await fetch(`/api/leave/${id}/status?username=${encodeURIComponent(u)}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                if (res.ok) {
                    showNotification(newStatus === 'approved' ? "已同意該假單" : "已拒絕該假單");
                    loadPendingLeaves();
                } else {
                    const data = await res.json();
                    showNotification(data.detail || "操作失敗", true);
                }
            } catch(e) { console.error(e); }
        }

        // --- 個人資料 ---
        async function loadMyProfile() {
            const u = localStorage.getItem('username');
            const role = localStorage.getItem('role');
            try {
                const res = await fetch(`/api/users/me?username=${encodeURIComponent(u)}`);
                if (!res.ok) return;
                const data = await res.json();
                document.getElementById('profileName').textContent = data.employee_name;
                document.getElementById('profilePhone').textContent = data.phone || '（未填寫）';
                document.getElementById('profileAddress').textContent = data.address || '（未填寫）';
                document.getElementById('profileSalary').textContent = data.salary ? '$' + data.salary.toLocaleString() + ' 元' : '（未設定）';
            } catch(e) { console.error(e); }
        }

        // --- Modal 相關 ---
        function openEditModal(id, phone, address, salary) {
            document.getElementById('editUserId').value = id;
            document.getElementById('editPhone').value = phone;
            document.getElementById('editAddress').value = address;
            document.getElementById('editSalary').value = salary;
            document.getElementById('editModal').classList.add('open');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('open');
        }

        async function submitEditUser() {
            const id = document.getElementById('editUserId').value;
            const u = localStorage.getItem('username');
            const payload = {
                phone: document.getElementById('editPhone').value || null,
                address: document.getElementById('editAddress').value || null,
                salary: document.getElementById('editSalary').value ? parseInt(document.getElementById('editSalary').value) : null
            };
            try {
                const res = await fetch(`/api/users/${id}?username=${encodeURIComponent(u)}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    showNotification('員工資料已更新！');
                    closeEditModal();
                    loadStaffList();
                } else {
                    const err = await res.json();
                    showNotification(err.detail || '更新失敗', true);
                }
            } catch(e) {
                showNotification('連線錯誤', true);
            }
        }

        // 點擊 overlay 空白處關閉 Modal
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) closeEditModal();
        });
    </script>
</body>
