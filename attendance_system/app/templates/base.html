<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}智能打卡系統{% endblock %}</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Leaflet JS & CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <style>
        :root {
            --primary-bg: #1e1e2f;
            --secondary-bg: #2d2b42;
            --accent: #ff758c;
            --accent-glow: rgba(255, 117, 140, 0.4);
            --text-light: #f1f1f1;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --nav-height: 70px;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary-bg), var(--secondary-bg));
            background-attachment: fixed;
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        /* ---------------- Navbar ---------------- */
        .navbar {
            height: var(--nav-height);
            background: rgba(30, 30, 47, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #ff758c 0%, #ff7eb3 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-menu {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-link {
            color: #a0a0b0;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-user-name {
            font-weight: 600;
            color: #e2e8f0;
        }

        .btn-logout-sm {
            background: transparent;
            border: 1px solid #f87171;
            color: #f87171;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .btn-logout-sm:hover {
            background: rgba(248, 113, 113, 0.1);
        }

        /* 手機版 Navbar 漢堡選單 (簡易版) */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* ---------------- Main Content ---------------- */
        .main-content {
            flex: 1;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            /* 稍微變寬一點 */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* 用來控制不同頁籤顯示的區塊 */
        .section-view {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .section-view.active {
            display: block;
        }

        /* ---------------- Footer ---------------- */
        .footer {
            background: #1a1a24;
            border-top: 1px solid var(--glass-border);
            padding: 40px 20px;
            color: #a0a0b0;
            font-size: 0.85rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 20px;
            line-height: 1.8;
        }

        .footer-col h4 {
            color: #fff;
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 1rem;
        }

        .footer-bottom {
            width: 100%;
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.8rem;
        }

        /* ---------------- 共用與原有元件 ---------------- */
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, #ff758c 0%, #ff7eb3 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #a0a0b0;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #d0d0d0;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: #ff758c;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--glass-border);
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            color: #a0a0b0;
            font-weight: 600;
            transition: all 0.3s;
        }

        .auth-tab.active {
            color: #ff758c;
            border-bottom: 2px solid #ff758c;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 16px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            border: none;
        }

        .btn-check-in {
            color: #4ade80;
            border-color: rgba(74, 222, 128, 0.3);
        }

        .btn-lunch-out {
            color: #fbbf24;
            border-color: rgba(251, 191, 36, 0.3);
        }

        .btn-lunch-in {
            color: #60a5fa;
            border-color: rgba(96, 165, 250, 0.3);
        }

        .btn-check-out {
            color: #f87171;
            border-color: rgba(248, 113, 113, 0.3);
        }

        .board-container {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            text-align: left;
        }

        .board-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #f1f1f1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .board-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 350px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* 滾動條樣式 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .board-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .status-work {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }

        .status-lunch {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        .status-off {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
        }

        .status-default {
            background: rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
        }

        .notification {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 100px;
            z-index: 2000;
            border: 1px solid var(--glass-border);
            transition: transform 0.4s;
        }

        .notification.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Stats & Table (簡化保留原本CSS) */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
        }

        .stat-num {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 0.78rem;
            color: #a0a0b0;
        }

        .employee-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        .employee-table th {
            padding: 8px;
            text-align: left;
            color: #a0a0b0;
            border-bottom: 1px solid var(--glass-border);
        }

        .employee-table td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ---------------- RWD 響應式設定 ---------------- */
        @media (max-width: 768px) {
            .nav-menu {
                display: none;
                /* 手機版先隱藏選單，點擊漢堡選單才出現 */
                position: absolute;
                top: var(--nav-height);
                left: 0;
                width: 100%;
                background: rgba(30, 30, 47, 0.95);
                flex-direction: column;
                padding: 20px 0;
                border-bottom: 1px solid var(--glass-border);
            }

            .nav-menu.show {
                display: flex;
            }

            .mobile-menu-btn {
                display: block;
            }

            .buttons-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .footer {
                flex-direction: column;
                text-align: center;
            }

            .chat-panel {
                width: 90vw;
                height: 60vh;
                right: 5vw;
                bottom: 90px;
            }
        }

        /* ---------------- AI 聊天室 ---------------- */
        .chat-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            pointer-events: none;
        }

        .chat-btn {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        .chat-panel {
            width: 350px;
            height: 450px;
            background: rgba(25, 25, 35, 0.95);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px) scale(0.95);
            transition: all 0.3s;
            transform-origin: bottom right;
        }

        .chat-panel.open {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }

        .chat-header {
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid var(--glass-border);
            font-weight: 600;
        }

        .chat-body {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-msg {
            max-width: 80%;
            padding: 10px;
            border-radius: 16px;
            font-size: 0.9rem;
            white-space: pre-wrap;
        }

        .msg-bot {
            background: rgba(255, 255, 255, 0.1);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg-user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chat-footer {
            padding: 12px;
            display: flex;
            gap: 8px;
            border-top: 1px solid var(--glass-border);
        }

        .chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border-radius: 100px;
            padding: 8px 16px;
            border: 1px solid var(--glass-border);
            outline: none;
        }

        /* Map Modal */
        .map-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .map-modal-content {
            background: var(--secondary-bg);
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            height: 70vh;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--glass-border);
        }
        .map-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .map-modal-close {
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--text-light);
        }
        #leafletMap {
            flex: 1;
            border-radius: 8px;
            background: #e5e5e5;
        }
    </style>
</head>

<body>
    <div class="notification" id="notification"></div>

    {% include 'navbar.html' %}

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    {% include 'footer.html' %}

    <!-- Map Modal -->
    <div class="map-modal" id="mapModal">
        <div class="map-modal-content">
            <div class="map-modal-header">
                <h3 style="margin:0;">打卡地點檢視</h3>
                <div class="map-modal-close" onclick="closeMapModal()"><i class="fas fa-times"></i></div>
            </div>
            <div id="leafletMap"></div>
        </div>
    </div>

    {# 外部 JS：從 inline 移出，避免 CSP 封鎖問題 #}
    <script src="/static/main.js?v=3.0"></script>
</body>

</html>
