services:
  web:
    build: .
    container_name: attendance_web
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://attendance_user:attendance_password@db:5432/attendance_db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./app:/code/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    container_name: attendance_db
    environment:
      POSTGRES_USER: attendance_user
      POSTGRES_PASSWORD: attendance_password
      POSTGRES_DB: attendance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U attendance_user -d attendance_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
